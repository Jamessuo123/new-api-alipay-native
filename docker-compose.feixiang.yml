services:
  postgres:
    image: postgres:17-alpine
    container_name: feixiangapi-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  feixiangapi:
    build:
      context: .
      dockerfile: Dockerfile.feixiang
    image: feixiangapi-newapi:source
    container_name: feixiangapi-newapi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./certs:/app/certs:ro
    environment:
      - TZ=Asia/Shanghai
      - PORT=3000
